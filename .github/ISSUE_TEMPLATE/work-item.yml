name: Work item
description: General task, migration work, process improvements, or admin work
title: "[Work Item]: "
type: Task
labels:
  - work-item
  - needs-triage
projects:
  - iOPSPro/5
body:
  - type: markdown
    attributes:
      value: |
        Use this template for non-bug, non-incident tasks (migration, platform work, governance, documentation, chores).

        The testing question below defaults to Yes. When Yes, automation adds the `needs-testing` label and can create a related testing child issue after metadata sync.

  - type: dropdown
    id: assign_current_iteration
    attributes:
      label: Assign to current iteration?
      description: "If Yes, automation adds `assign-current-iteration`; the follow-up workflow adds this issue to the project if needed, sets Project V2 `Iteration` to the current iteration, sets `60 Day Block` to the current block when that field exists, then removes the temporary label. If No, no iteration fields are requested."
      options:
        - "No"
        - "Yes"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: needs_testing
    attributes:
      label: Does this issue need testing?
      description: "If Yes, automation adds `needs-testing`. After metadata and iteration sync, a `Testing: <title>` child issue can be created, attached as a sub-issue, assigned to the same assignees, and populated with the parent's `Iteration`, `60 Day Block`, `Environment`, `Created By`, `Segment`, `Organization`, and `Site` values. If No, no testing child issue is requested."
      options:
        - "Yes"
        - "No"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: specific_environment
    attributes:
      label: Is there a specific environment this is for?
      description: "This answer is written to the Organization Issue Field `Environment`. Select exactly one supported value: V1, V2, Backend, N/A, or Both V1 and V2."
      options:
        - "V1"
        - "V2"
        - "Backend"
        - "N/A"
        - "Both V1 and V2"
    validations:
      required: true

  - type: dropdown
    id: segment
    attributes:
      label: Segment
      description: "This answer is written to the Organization Issue Field `Segment`. Select exactly one supported value: GSE, Gate Systems, Both, or N/A. Use Both only when the work applies to both supported segments; use N/A for internal work that does not map to a customer segment."
      options:
        - "GSE"
        - "Gate Systems"
        - "Both"
        - "N/A"
    validations:
      required: true

  - type: input
    id: organization
    attributes:
      label: Organization
      description: "Automation normalizes this answer through the organization registry and writes the canonical value to the Organization Issue Field `Organization`. Enter one canonical organization name or known alias. Do not enter Multiple, Other, Unknown, a list, or free-form notes. If more than one organization is affected, enter the primary organization only; use Internal for iOPSPro/internal work; leave blank if no single organization applies."
      placeholder: e.g., Internal / Delta Air Lines
    validations:
      required: false

  - type: input
    id: site
    attributes:
      label: Site
      description: "Automation normalizes this answer through the site registry and writes the canonical value to the Organization Issue Field `Site`. Enter one canonical site name, site code, or known alias. Do not enter Multiple, Other, Unknown, a list, or free-form notes. If more than one site is affected, enter the primary site only; leave blank if no single site applies."
      placeholder: e.g., SLC / Salt Lake City International Airport
    validations:
      required: false

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What needs to be done and why?
      placeholder: A clear, one-paragraph objective and desired outcome.
    validations:
      required: true

  - type: input
    id: requested_by
    attributes:
      label: Requested by
      description: Who requested this work?
      placeholder: e.g., @username / Team / Stakeholder
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and out of scope?
      placeholder: |
        In scope:
        Out of scope:
    validations:
      required: false

  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of done
      placeholder: Clear completion criteria (tests, docs, approvals, rollout).
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / blockers
      description: List anything this work depends on or anything currently blocking it.
      placeholder: Link related issues, repos, approvals, or vendor items.
    validations:
      required: false

  - type: input
    id: owner
    attributes:
      label: Proposed owner (optional)
      placeholder: "@username or team"
    validations:
      required: false
