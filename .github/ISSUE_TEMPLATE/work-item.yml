name: Work item
description: General task, migration work, process improvements, or admin work
title: "[Work Item]: "
labels:
  - work-item
  - needs-triage
  - needs-testing
projects:
  - iOPSPro/5
body:
  - type: markdown
    attributes:
      value: |
        Use this template for non-bug, non-incident tasks (migration, platform work, governance, documentation, chores).

        Issues created from this form automatically receive the `needs-testing` label.
        Future automation will use that label to create a related testing child issue.

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What needs to be done and why?
      placeholder: A clear, one-paragraph objective and desired outcome.
    validations:
      required: true

  - type: dropdown
    id: work_type
    attributes:
      label: Work type
      options:
        - Migration
        - Governance / compliance
        - Platform / infrastructure
        - Process / documentation
        - Cleanup / refactor
        - Other
    validations:
      required: true

  - type: dropdown
    id: functional_area
    attributes:
      label: Functional area
      options:
        - UI
        - API
        - Backend service
        - Infrastructure
        - CI/CD
        - Documentation
        - Other / Unknown
    validations:
      required: true

  - type: input
    id: requested_by
    attributes:
      label: Requested by
      description: Who requested this work?
      placeholder: e.g., @username / Team / Stakeholder
    validations:
      required: false

  - type: input
    id: customer
    attributes:
      label: Customer (if applicable)
      placeholder: e.g., Internal / Acme Corp / Multiple customers
    validations:
      required: false

  - type: input
    id: site
    attributes:
      label: Site / environment (if applicable)
      placeholder: e.g., prod / staging / dev / tenant-123 / us-east-1
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and out of scope?
      placeholder: |
        In scope:
        Out of scope:
    validations:
      required: false

  - type: textarea
    id: tasks
    attributes:
      label: Tasks / checklist
      description: Break down the work into actionable items.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false

  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of done
      placeholder: Clear completion criteria (tests, docs, approvals, rollout).
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / blockers
      description: List anything this work depends on or anything currently blocking it.
      placeholder: Link related issues, repos, approvals, or vendor items.
    validations:
      required: false

  - type: input
    id: owner
    attributes:
      label: Proposed owner (optional)
      placeholder: "@username or team"
    validations:
      required: false