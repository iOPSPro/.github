name: Work item
description: General task, migration work, process improvements, or admin work
title: "[Work Item]: "
type: Task
labels:
  - work-item
  - needs-triage
projects:
  - iOPSPro/5
body:
  - type: markdown
    attributes:
      value: |
        Use this template for non-bug, non-incident tasks (migration, platform work, governance, documentation, chores).

        Issues created from this form automatically receive the `needs-testing` label.
        Future automation will use that label to create a related testing child issue.

  - type: dropdown
    id: assign_current_iteration
    attributes:
      label: Assign to current iteration?
      description: Select "Yes" to signal automation to add the `assign-current-iteration` label after issue creation.
      options:
        - "No"
        - "Yes"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: needs_testing
    attributes:
      label: Does this issue need testing?
      options:
        - "Yes"
        - "No"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: specific_application
    attributes:
      label: Is there a specific application this is for?
      options:
        - "N/A"
        - "V1"
        - "V2"
      default: 0
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What needs to be done and why?
      placeholder: A clear, one-paragraph objective and desired outcome.
    validations:
      required: true

  - type: input
    id: requested_by
    attributes:
      label: Requested by
      description: Who requested this work?
      placeholder: e.g., @username / Team / Stakeholder
    validations:
      required: false

  - type: input
    id: customer
    attributes:
      label: Customer (if applicable)
      placeholder: e.g., Internal / Acme Corp / Multiple customers
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and out of scope?
      placeholder: |
        In scope:
        Out of scope:
    validations:
      required: false

  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of done
      placeholder: Clear completion criteria (tests, docs, approvals, rollout).
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / blockers
      description: List anything this work depends on or anything currently blocking it.
      placeholder: Link related issues, repos, approvals, or vendor items.
    validations:
      required: false

  - type: input
    id: owner
    attributes:
      label: Proposed owner (optional)
      placeholder: "@username or team"
    validations:
      required: false
