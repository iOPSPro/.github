name: Feature request
description: Propose an enhancement or new capability
title: "[Feature]: "
type: Feature
labels:
  - enhancement
  - needs-triage
projects:
  - iOPSPro/5
body:
  - type: markdown
    attributes:
      value: |
        Use this form to propose new functionality or an improvement.

        Keep details safe for a public repository (no customer secrets, credentials, or private URLs).

  - type: dropdown
    id: assign_current_iteration
    attributes:
      label: Assign to current iteration?
      description: Select "Yes" to signal automation to add the `assign-current-iteration` label after issue creation.
      options:
        - "No"
        - "Yes"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: needs_testing
    attributes:
      label: Does this issue need testing?
      options:
        - "Yes"
        - "No"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: specific_application
    attributes:
      label: Is there a specific application this is for?
      options:
        - "N/A"
        - "V1"
        - "V2"
      default: 0
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Who is affected?
      placeholder: |
        As a <user>, I want <capability>, so that <benefit>.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see built?
      placeholder: Describe the desired behavior, UX, APIs, and any constraints.
    validations:
      required: true

  - type: textarea
    id: business_value
    attributes:
      label: Business value / impact
      description: Why does this matter (time saved, revenue, risk reduction, user satisfaction)?
      placeholder: |
        - Impact:
        - Approx. users affected:
        - Value:
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria / definition of done
      description: How will we know this is complete?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / blockers
      placeholder: Link related issues, repos, vendors, approvals, or migrations.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Mockups, references, links, or notes.
    validations:
      required: false
