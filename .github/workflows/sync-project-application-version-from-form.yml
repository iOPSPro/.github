name: Sync issue environment from issue form (reusable)

on:
  workflow_call:
    inputs:
      owner:
        description: Organization or user that owns the repository containing the issue
        required: true
        type: string
      repo:
        description: Repository name containing the issue
        required: true
        type: string
      issue_number:
        description: Issue number to update
        required: true
        type: number
      project_owner:
        description: Organization that owns the Issue Field. Defaults to the Project owner for backward compatibility.
        required: true
        type: string
      project_number:
        description: Deprecated. Kept for backward compatibility with existing callers.
        required: true
        type: number
      project_field_name:
        description: Deprecated alias for issue_field_name
        required: false
        default: Environment
        type: string
      issue_field_name:
        description: Organization Issue Field single-select name
        required: false
        default: Environment
        type: string
      question_heading:
        description: Issue form heading to inspect for environment value
        required: false
        default: Is there a specific environment this is for?
        type: string
    secrets:
      project_token:
        description: Token with access to read/write Organization Issue Fields
        required: true

jobs:
  sync_application_version:
    name: Set Issue Environment from issue form
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read

    steps:
      - name: Set Environment field
        uses: actions/github-script@v8
        env:
          INPUT_OWNER: ${{ inputs.owner }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
          INPUT_PROJECT_OWNER: ${{ inputs.project_owner }}
          INPUT_PROJECT_FIELD_NAME: ${{ inputs.project_field_name }}
          INPUT_ISSUE_FIELD_NAME: ${{ inputs.issue_field_name }}
          INPUT_QUESTION_HEADING: ${{ inputs.question_heading }}
        with:
          github-token: ${{ secrets.project_token }}
          script: |
            const owner = process.env.INPUT_OWNER;
            const repo = process.env.INPUT_REPO;
            const issue_number = Number(process.env.INPUT_ISSUE_NUMBER);
            const issueFieldOwner = (process.env.INPUT_PROJECT_OWNER || owner).trim();
            const fieldName = (
              process.env.INPUT_ISSUE_FIELD_NAME ||
              process.env.INPUT_PROJECT_FIELD_NAME ||
              'Environment'
            ).trim();
            const heading = (process.env.INPUT_QUESTION_HEADING || 'Is there a specific environment this is for?').trim();
            const validResponses = new Set(['V1', 'V2', 'Backend', 'N/A', 'Both V1 and V2']);

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const issueBody = issue.body || '';
            const escapedHeading = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            // GitHub issue forms render question labels as `###` markdown headings.
            const headingPattern = new RegExp(`^###\\s*${escapedHeading}\\s*$`, 'i');
            const lines = issueBody.split(/\r?\n/);

            const findResponseValue = () => {
              for (let i = 0; i < lines.length; i += 1) {
                if (!headingPattern.test(lines[i].trim())) continue;
                for (let j = i + 1; j < lines.length; j += 1) {
                  const candidate = lines[j].trim();
                  if (!candidate) continue;
                  return candidate;
                }
                return '';
              }
              return '';
            };

            const responseValue = findResponseValue();
            if (!responseValue) {
              core.info(`Heading "${heading}" not found on #${issue_number}. Skipping.`);
              return;
            }

            if (!validResponses.has(responseValue)) {
              throw new Error(
                `Unsupported environment response "${responseValue}" on #${issue_number}. Expected one of: ${[...validResponses].join(', ')}.`
              );
            }

            const issueNodeId = issue.node_id;
            if (!issueNodeId) {
              throw new Error(`Issue #${issue_number} has no node_id; cannot set Issue Fields.`);
            }

            const queryIssueFieldsForOrg = `
              query($login: String!) {
                organization(login: $login) {
                  issueFields(first: 100) {
                    nodes {
                      ... on IssueFieldSingleSelect {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `;

            const issueFieldResult = await github.graphql(queryIssueFieldsForOrg, {
              login: issueFieldOwner
            });

            const singleSelectFields = (issueFieldResult?.organization?.issueFields?.nodes || []).filter(Boolean);
            const field = singleSelectFields.find(
              (candidate) => (candidate.name || '').trim().toLowerCase() === fieldName.toLowerCase()
            );

            if (!field) {
              const availableFieldNames = singleSelectFields.map((candidate) => candidate.name).filter(Boolean);
              throw new Error(
                `Issue single-select field "${fieldName}" not found on organization "${issueFieldOwner}". Available single-select fields: ${availableFieldNames.join(', ')}`
              );
            }

            const option = (field.options || []).find(
              (candidate) => (candidate.name || '').trim().toLowerCase() === responseValue.toLowerCase()
            );

            if (!option) {
              const availableOptionNames = (field.options || []).map((candidate) => candidate.name).filter(Boolean);
              throw new Error(
                `Option "${responseValue}" not found in Issue Field "${fieldName}" on organization "${issueFieldOwner}". Available options: ${availableOptionNames.join(', ')}`
              );
            }

            const setIssueFieldMutation = `
              mutation($issueId: ID!, $fieldId: ID!, $optionId: ID!) {
                setIssueFieldValue(
                  input: {
                    issueId: $issueId
                    issueFields: [
                      {
                        fieldId: $fieldId
                        singleSelectOptionId: $optionId
                      }
                    ]
                  }
                ) {
                  issue {
                    id
                  }
                }
              }
            `;

            await github.graphql(setIssueFieldMutation, {
              issueId: issueNodeId,
              fieldId: field.id,
              optionId: option.id
            });

            core.setOutput('issue_field_owner', issueFieldOwner);
            core.setOutput('field_name', field.name);
            core.setOutput('application_version', option.name);
            core.setOutput('environment', option.name);
            core.info(`Set Issue Field "${field.name}" to "${option.name}" for #${issue_number}.`);

# Example per-repo caller workflow:
#
# name: Sync environment from issue form
#
# on:
#   issues:
#     types: [opened, edited]
#
