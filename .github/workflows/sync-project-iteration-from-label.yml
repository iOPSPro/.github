name: Sync project iteration from label (reusable)

on:
  workflow_call:
    inputs:
      owner:
        description: Organization or user that owns the repository containing the issue
        required: true
        type: string
      repo:
        description: Repository name containing the issue
        required: true
        type: string
      issue_number:
        description: Issue number to update
        required: true
        type: number
      project_owner:
        description: Organization or user that owns the Project V2
        required: true
        type: string
      project_number:
        description: Project V2 number (e.g., 5 for iOPSPro/5)
        required: true
        type: number
      iteration_field_name:
        description: Primary Project Iteration field name
        required: false
        default: Iteration
        type: string
      secondary_iteration_field_name:
        description: Secondary Project Iteration field name
        required: false
        default: 60 Day Block
        type: string
      label_name:
        description: Label that triggers iteration assignment (removed on success)
        required: false
        default: assign-current-iteration
        type: string
    secrets:
      project_token:
        description: Token with access to read/write Project V2 fields and remove labels
        required: true

jobs:
  sync_iteration:
    name: Set Project Iteration from label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Set iteration and remove label
        uses: actions/github-script@v8
        env:
          INPUT_OWNER: ${{ inputs.owner }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
          INPUT_PROJECT_OWNER: ${{ inputs.project_owner }}
          INPUT_PROJECT_NUMBER: ${{ inputs.project_number }}
          INPUT_ITERATION_FIELD_NAME: ${{ inputs.iteration_field_name }}
          INPUT_SECONDARY_ITERATION_FIELD_NAME: ${{ inputs.secondary_iteration_field_name }}
          INPUT_LABEL_NAME: ${{ inputs.label_name }}
        with:
          github-token: ${{ secrets.project_token }}
          script: |
            const owner = process.env.INPUT_OWNER;
            const repo = process.env.INPUT_REPO;
            const issue_number = Number(process.env.INPUT_ISSUE_NUMBER);
            const projectOwner = process.env.INPUT_PROJECT_OWNER;
            const projectNumber = Number(process.env.INPUT_PROJECT_NUMBER);
            const primaryIterationFieldName = (process.env.INPUT_ITERATION_FIELD_NAME || 'Iteration').trim();
            const secondaryIterationFieldName = (process.env.INPUT_SECONDARY_ITERATION_FIELD_NAME || '60 Day Block').trim();
            const labelName = (process.env.INPUT_LABEL_NAME || 'assign-current-iteration').trim();

            const normalizeLabelName = (label) =>
              (typeof label === 'string' ? label : label?.name || '').trim().toLowerCase();

            const todayIso = new Date().toISOString().slice(0, 10);

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const issueLabels = (issue.labels || []).map(normalizeLabelName).filter(Boolean);
            core.info(`Current labels on #${issue_number}: ${issueLabels.join(', ') || '(none)'}`);

            if (!issueLabels.includes(labelName.toLowerCase())) {
              core.info(`Label "${labelName}" not present on #${issue_number}. Skipping.`);
              return;
            }

            const issueNodeId = issue.node_id;
            if (!issueNodeId) {
              throw new Error(`Issue #${issue_number} has no node_id; cannot use Projects V2 GraphQL mutations.`);
            }

            const queryProjectForOrg = `
              query($login: String!, $number: Int!, $cursor: String) {
                organization(login: $login) {
                  projectV2(number: $number) {
                    id
                    title
                    fields(first: 100) {
                      nodes {
                        ... on ProjectV2IterationField {
                          id
                          name
                          configuration {
                            iterations {
                              id
                              title
                              startDate
                              duration
                            }
                            completedIterations {
                              id
                              title
                              startDate
                              duration
                            }
                          }
                        }
                      }
                    }
                    items(first: 100, after: $cursor) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        id
                        content {
                          ... on Issue {
                            id
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const queryProjectForUser = `
              query($login: String!, $number: Int!, $cursor: String) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    title
                    fields(first: 100) {
                      nodes {
                        ... on ProjectV2IterationField {
                          id
                          name
                          configuration {
                            iterations {
                              id
                              title
                              startDate
                              duration
                            }
                            completedIterations {
                              id
                              title
                              startDate
                              duration
                            }
                          }
                        }
                      }
                    }
                    items(first: 100, after: $cursor) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        id
                        content {
                          ... on Issue {
                            id
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const getProjectPage = async (cursor = null) => {
              try {
                const orgResult = await github.graphql(queryProjectForOrg, {
                  login: projectOwner,
                  number: projectNumber,
                  cursor
                });
                const orgProject = orgResult?.organization?.projectV2;
                if (orgProject) return orgProject;
              } catch (error) {
                // Ignore and try user lookup next.
              }

              const userResult = await github.graphql(queryProjectForUser, {
                login: projectOwner,
                number: projectNumber,
                cursor
              });
              const userProject = userResult?.user?.projectV2;
              if (userProject) return userProject;

              throw new Error(`Project not found: ${projectOwner}/${projectNumber}`);
            };

            const firstPage = await getProjectPage(null);
            const projectId = firstPage.id;
            const projectTitle = firstPage.title;

            const iterationFields = (firstPage.fields?.nodes || []).filter(Boolean);
            const availableIterationFieldNames = iterationFields.map((field) => field.name).filter(Boolean);

            const toDateUtc = (isoDate) => new Date(`${isoDate}T00:00:00Z`);
            const addDaysUtc = (date, days) => new Date(date.getTime() + days * 24 * 60 * 60 * 1000);
            const todayDate = toDateUtc(todayIso);

            const findFieldByName = (fieldName) =>
              iterationFields.find(
                (field) => (field.name || '').trim().toLowerCase() === fieldName.toLowerCase()
              );

            const findCurrentIterationForField = (field, fieldName) => {
              const allIterations = [
                ...(field.configuration?.iterations || []),
                ...(field.configuration?.completedIterations || [])
              ].filter(Boolean);

              const uniqueById = new Map(allIterations.map((iteration) => [iteration.id, iteration]));
              const iterations = [...uniqueById.values()].sort((a, b) =>
                String(a.startDate).localeCompare(String(b.startDate))
              );

              if (iterations.length === 0) {
                throw new Error(`No iterations found in field "${fieldName}" on project "${projectTitle}".`);
              }

              const currentIteration = iterations.find((iteration) => {
                if (!iteration.startDate || !iteration.duration) return false;
                const start = toDateUtc(iteration.startDate);
                const end = addDaysUtc(start, iteration.duration);
                return todayDate >= start && todayDate < end;
              });

              if (!currentIteration) {
                const oldest = iterations[0];
                const newest = iterations[iterations.length - 1];
                throw new Error(
                  `No current iteration matched for field "${fieldName}" on ${todayIso}. Iterations range from ${oldest.startDate} to ${newest.startDate}.`
                );
              }

              return currentIteration;
            };

            const fieldsToSync = [];

            const primaryField = findFieldByName(primaryIterationFieldName);
            if (!primaryField) {
              throw new Error(
                `Iteration field "${primaryIterationFieldName}" not found on project "${projectTitle}". Available iteration fields: ${availableIterationFieldNames.join(', ')}`
              );
            }

            fieldsToSync.push({
              fieldName: primaryIterationFieldName,
              fieldId: primaryField.id,
              iteration: findCurrentIterationForField(primaryField, primaryIterationFieldName)
            });

            const secondaryField = findFieldByName(secondaryIterationFieldName);
            if (secondaryField) {
              fieldsToSync.push({
                fieldName: secondaryIterationFieldName,
                fieldId: secondaryField.id,
                iteration: findCurrentIterationForField(secondaryField, secondaryIterationFieldName)
              });
            } else {
              core.info(
                `Secondary iteration field "${secondaryIterationFieldName}" not found on project "${projectTitle}". Skipping it.`
              );
            }

            let itemId =
              (firstPage.items?.nodes || []).find((item) => item?.content?.id === issueNodeId)?.id || null;

            let hasNextPage = firstPage.items?.pageInfo?.hasNextPage || false;
            let cursor = firstPage.items?.pageInfo?.endCursor || null;

            while (!itemId && hasNextPage) {
              const nextPage = await getProjectPage(cursor);
              itemId =
                (nextPage.items?.nodes || []).find((item) => item?.content?.id === issueNodeId)?.id || null;
              hasNextPage = nextPage.items?.pageInfo?.hasNextPage || false;
              cursor = nextPage.items?.pageInfo?.endCursor || null;
            }

            if (!itemId) {
              const addToProjectMutation = `
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                    item {
                      id
                    }
                  }
                }
              `;

              const addResult = await github.graphql(addToProjectMutation, {
                projectId,
                contentId: issueNodeId
              });

              itemId = addResult?.addProjectV2ItemById?.item?.id || null;
            }

            if (!itemId) {
              throw new Error(`Failed to locate or create Project item for issue #${issue_number} in ${projectOwner}/${projectNumber}.`);
            }

            const updateIterationMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $iterationId: String!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { iterationId: $iterationId }
                  }
                ) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            for (const fieldToSync of fieldsToSync) {
              await github.graphql(updateIterationMutation, {
                projectId,
                itemId,
                fieldId: fieldToSync.fieldId,
                iterationId: fieldToSync.iteration.id
              });

              core.info(
                `Set field "${fieldToSync.fieldName}" to "${fieldToSync.iteration.title}" for #${issue_number}.`
              );
            }

            core.setOutput('project_title', projectTitle);
            core.setOutput('iteration_title', fieldsToSync[0].iteration.title);
            core.setOutput('iteration_start_date', fieldsToSync[0].iteration.startDate);
            core.setOutput('iteration_duration_days', String(fieldsToSync[0].iteration.duration));

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number,
                name: labelName
              });
            } catch (error) {
              if (error?.status === 404) {
                core.info(`Label "${labelName}" was already removed from #${issue_number}.`);
              } else {
                throw error;
              }
            }

            core.info(
              `Set ${fieldsToSync.length} iteration field(s) on project "${projectTitle}" for #${issue_number} and removed "${labelName}".`
            );

# Example per-repo caller workflow:
#
# name: Sync iteration from label
#
# on:
#   issues:
#     types: [labeled]
#
# jobs:
#   call-reusable-worker:
#     if: ${{ github.event.issue.state == 'open' && github.event.label.name == 'assign-current-iteration' }}
#     uses: iOPSPro/.github/.github/workflows/sync-project-iteration-from-label.yml@main
#     with:
#       owner: ${{ github.repository_owner }}
#       repo: ${{ github.event.repository.name }}
#       issue_number: ${{ github.event.issue.number }}
#       project_owner: iOPSPro
#       project_number: 5
#     secrets:
#       project_token: ${{ secrets.PROJECT_TOKEN }}