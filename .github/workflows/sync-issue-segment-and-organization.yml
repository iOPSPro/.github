name: Sync issue segment and organization (reusable)

on:
  workflow_call:
    inputs:
      owner:
        description: Organization or user that owns the repository containing the issue
        required: true
        type: string
      repo:
        description: Repository name containing the issue
        required: true
        type: string
      issue_number:
        description: Issue number to update
        required: true
        type: number
      issue_field_owner:
        description: Organization that owns the Issue Fields
        required: false
        default: iOPSPro
        type: string
      segment_issue_field_name:
        description: Organization Issue Field name for Segment
        required: false
        default: Segment
        type: string
      segment_issue_field_id:
        description: Numeric Organization Issue Field ID for Segment. Defaults to iOPSPro Segment.
        required: false
        default: "42612296"
        type: string
      organization_issue_field_name:
        description: Organization Issue Field name for Organization
        required: false
        default: Organization
        type: string
      organization_issue_field_id:
        description: Numeric Organization Issue Field ID for Organization. Defaults to iOPSPro Organization.
        required: false
        default: "42656518"
        type: string
      segment_heading:
        description: Issue form heading to inspect for Segment
        required: false
        default: Segment
        type: string
      organization_heading:
        description: Issue form heading to inspect for Organization
        required: false
        default: Organization
        type: string
      valid_segments_json:
        description: JSON array of allowed Segment values
        required: false
        default: '["GSE","Gate Systems","Both","N/A"]'
        type: string
      registry_repository:
        description: Repository containing the canonical organization registry
        required: false
        default: iOPSPro/.github
        type: string
      registry_ref:
        description: Git ref to check out for the registry
        required: false
        default: main
        type: string
      registry_path:
        description: Path to the canonical organization registry JSON file
        required: false
        default: data/organization-registry.json
        type: string
      comment_on_invalid:
        description: Comment on the issue when the organization is unknown
        required: false
        default: true
        type: boolean
    secrets:
      project_token:
        description: Token with access to read/write Organization Issue Fields and issue comments
        required: true

jobs:
  sync_segment_and_organization:
    name: Set Issue Segment and Organization
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Check out organization registry
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.registry_repository }}
          ref: ${{ inputs.registry_ref }}
          path: github-defaults
          token: ${{ secrets.project_token }}

      - name: Normalize issue metadata
        id: normalize
        uses: actions/github-script@v8
        env:
          INPUT_OWNER: ${{ inputs.owner }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
          INPUT_ISSUE_FIELD_OWNER: ${{ inputs.issue_field_owner }}
          INPUT_SEGMENT_FIELD_NAME: ${{ inputs.segment_issue_field_name }}
          INPUT_SEGMENT_FIELD_ID: ${{ inputs.segment_issue_field_id }}
          INPUT_ORGANIZATION_FIELD_NAME: ${{ inputs.organization_issue_field_name }}
          INPUT_ORGANIZATION_FIELD_ID: ${{ inputs.organization_issue_field_id }}
          INPUT_SEGMENT_HEADING: ${{ inputs.segment_heading }}
          INPUT_ORGANIZATION_HEADING: ${{ inputs.organization_heading }}
          INPUT_VALID_SEGMENTS_JSON: ${{ inputs.valid_segments_json }}
          INPUT_REGISTRY_PATH: ${{ inputs.registry_path }}
          INPUT_COMMENT_ON_INVALID: ${{ inputs.comment_on_invalid }}
        with:
          github-token: ${{ secrets.project_token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = process.env.INPUT_OWNER;
            const repo = process.env.INPUT_REPO;
            const issue_number = Number(process.env.INPUT_ISSUE_NUMBER);
            const issueFieldOwner = (process.env.INPUT_ISSUE_FIELD_OWNER || owner).trim();
            const segmentFieldName = (process.env.INPUT_SEGMENT_FIELD_NAME || 'Segment').trim();
            const segmentFieldId = Number(process.env.INPUT_SEGMENT_FIELD_ID || 0);
            const organizationFieldName = (process.env.INPUT_ORGANIZATION_FIELD_NAME || 'Organization').trim();
            const organizationFieldId = Number(process.env.INPUT_ORGANIZATION_FIELD_ID || 0);
            const segmentHeading = (process.env.INPUT_SEGMENT_HEADING || 'Segment').trim();
            const organizationHeading = (process.env.INPUT_ORGANIZATION_HEADING || 'Organization').trim();
            const registryPath = path.join('github-defaults', process.env.INPUT_REGISTRY_PATH || 'data/organization-registry.json');
            const commentOnInvalid = process.env.INPUT_COMMENT_ON_INVALID === 'true';

            const parseJsonArray = (raw, name) => {
              try {
                const parsed = JSON.parse(raw || '[]');
                if (!Array.isArray(parsed)) throw new Error(`${name} must be an array.`);
                return parsed;
              } catch (error) {
                throw new Error(`Invalid ${name}: ${error.message}`);
              }
            };

            const validSegments = new Set(parseJsonArray(process.env.INPUT_VALID_SEGMENTS_JSON, 'valid_segments_json'));

            if (!segmentFieldId) {
              throw new Error(`Missing numeric Issue Field ID for "${segmentFieldName}" on organization "${issueFieldOwner}".`);
            }

            if (!fs.existsSync(registryPath)) {
              throw new Error(`Organization registry not found at ${registryPath}.`);
            }

            const registry = JSON.parse(fs.readFileSync(registryPath, 'utf8'));
            if (!Array.isArray(registry)) {
              throw new Error(`Organization registry must be a JSON array.`);
            }

            const normalizeKey = (value) =>
              String(value || '')
                .trim()
                .toLowerCase()
                .replace(/&/g, ' and ')
                .replace(/[^a-z0-9]+/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();

            const registryByKey = new Map();
            for (const entry of registry) {
              if (!entry || !entry.id || !entry.name) {
                throw new Error(`Every organization registry entry must include id and name.`);
              }

              const aliases = Array.isArray(entry.aliases) ? entry.aliases : [];
              for (const value of [entry.id, entry.name, ...aliases]) {
                const key = normalizeKey(value);
                if (!key) continue;
                if (registryByKey.has(key) && registryByKey.get(key).name !== entry.name) {
                  throw new Error(`Duplicate organization registry alias "${value}" maps to multiple organizations.`);
                }
                registryByKey.set(key, entry);
              }
            }

            const levenshtein = (a, b) => {
              const rows = Array.from({ length: a.length + 1 }, (_, i) => [i]);
              for (let j = 1; j <= b.length; j += 1) rows[0][j] = j;
              for (let i = 1; i <= a.length; i += 1) {
                for (let j = 1; j <= b.length; j += 1) {
                  const cost = a[i - 1] === b[j - 1] ? 0 : 1;
                  rows[i][j] = Math.min(
                    rows[i - 1][j] + 1,
                    rows[i][j - 1] + 1,
                    rows[i - 1][j - 1] + cost
                  );
                }
              }
              return rows[a.length][b.length];
            };

            const findSuggestion = (rawValue) => {
              const key = normalizeKey(rawValue);
              if (!key) return null;

              let best = null;
              for (const [aliasKey, entry] of registryByKey.entries()) {
                const distance = levenshtein(key, aliasKey);
                const ratio = distance / Math.max(key.length, aliasKey.length, 1);
                if (!best || distance < best.distance || (distance === best.distance && aliasKey.length < best.aliasKey.length)) {
                  best = { entry, aliasKey, distance, ratio };
                }
              }

              if (!best) return null;
              const allowableDistance = key.length <= 5 ? 1 : 2;
              return best.distance <= allowableDistance || best.ratio <= 0.25 ? best.entry : null;
            };

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const lines = (issue.body || '').split(/\r?\n/);
            const findResponseValue = (headings) => {
              const headingPatterns = headings.map(heading => {
                const escapedHeading = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                return new RegExp(`^###\\s*${escapedHeading}\\s*$`, 'i');
              });

              for (let i = 0; i < lines.length; i += 1) {
                if (!headingPatterns.some(pattern => pattern.test(lines[i].trim()))) continue;
                for (let j = i + 1; j < lines.length; j += 1) {
                  const candidate = lines[j].trim();
                  if (/^###\s+/.test(candidate)) return '';
                  if (!candidate || candidate === '_No response_') continue;
                  return candidate;
                }
                return '';
              }
              return '';
            };

            const segmentValue = findResponseValue([segmentHeading]);
            const organizationInput = findResponseValue([
              organizationHeading,
              'Customer (if applicable)',
              'Customer / tenant (if applicable)'
            ]);

            const issueFieldValues = [];
            const writeIssueFieldValues = async () => {
              if (issueFieldValues.length === 0) return;

              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/issue-field-values', {
                owner,
                repo,
                issue_number,
                issue_field_values: issueFieldValues,
                headers: {
                  'X-GitHub-Api-Version': '2026-03-10'
                }
              });

              issueFieldValues.length = 0;
            };

            if (segmentValue) {
              if (!validSegments.has(segmentValue)) {
                throw new Error(
                  `Unsupported ${segmentFieldName} response "${segmentValue}" on #${issue_number}. Expected one of: ${[...validSegments].join(', ')}.`
                );
              }
              issueFieldValues.push({
                field_id: segmentFieldId,
                value: segmentValue
              });
            } else {
              core.info(`Heading "${segmentHeading}" not found on #${issue_number}. Skipping ${segmentFieldName}.`);
            }

            let canonicalOrganization = '';
            let organizationStatus = 'blank';

            if (organizationInput) {
              const organizationKey = normalizeKey(organizationInput);
              const registryEntry = registryByKey.get(organizationKey);
              if (registryEntry) {
                canonicalOrganization = registryEntry.name;
                organizationStatus = canonicalOrganization === organizationInput ? 'canonical' : 'alias';

                if (organizationFieldId) {
                  issueFieldValues.push({
                    field_id: organizationFieldId,
                    value: canonicalOrganization
                  });
                } else {
                  core.warning(`No numeric Issue Field ID configured for "${organizationFieldName}". Normalized value "${canonicalOrganization}" was not written.`);
                }
              } else {
                organizationStatus = 'unknown';
                const suggestion = findSuggestion(organizationInput);
                const marker = '<!-- iops-organization-validation -->';
                const suggestionText = suggestion ? ` Did you mean **${suggestion.name}**?` : '';
                const body = `${marker}\nUnknown organization **${organizationInput}**.${suggestionText}\n\nPlease update the issue Organization value or add the organization and aliases to \`${process.env.INPUT_REGISTRY_PATH}\`.`;

                if (commentOnInvalid) {
                  const comments = await github.paginate(github.rest.issues.listComments, {
                    owner,
                    repo,
                    issue_number,
                    per_page: 100
                  });

                  const existingComment = comments.find(comment =>
                    comment.user?.type === 'Bot' && String(comment.body || '').includes(marker)
                  );

                  if (existingComment) {
                    await github.rest.issues.updateComment({
                      owner,
                      repo,
                      comment_id: existingComment.id,
                      body
                    });
                  } else {
                    await github.rest.issues.createComment({
                      owner,
                      repo,
                      issue_number,
                      body
                    });
                  }
                }

                await writeIssueFieldValues();
                throw new Error(`Unknown organization "${organizationInput}" on #${issue_number}.${suggestionText}`);
              }
            } else {
              core.info(`Heading "${organizationHeading}" not found or blank on #${issue_number}. Skipping ${organizationFieldName}.`);
            }

            await writeIssueFieldValues();

            core.setOutput('segment', segmentValue);
            core.setOutput('organization_input', organizationInput);
            core.setOutput('organization', canonicalOrganization);
            core.setOutput('organization_status', organizationStatus);

            if (segmentValue) {
              core.info(`Set Issue Field "${segmentFieldName}" to "${segmentValue}" for #${issue_number}.`);
            }
            if (canonicalOrganization) {
              core.info(`Normalized "${organizationInput}" to "${canonicalOrganization}" for #${issue_number}.`);
            }

# Example per-repo caller workflow:
#
# name: Sync segment and organization
#
# on:
#   issues:
#     types: [opened, edited]
#
# jobs:
#   call-reusable-worker:
#     if: ${{ github.event.issue.state == 'open' }}
#     uses: iOPSPro/.github/.github/workflows/sync-issue-segment-and-organization.yml@main
#     with:
#       owner: ${{ github.repository_owner }}
#       repo: ${{ github.event.repository.name }}
#       issue_number: ${{ github.event.issue.number }}
#       issue_field_owner: iOPSPro
#       segment_issue_field_id: "42612296"
#       organization_issue_field_id: "42656518"
#     secrets:
#       project_token: ${{ secrets.PROJECT_TOKEN }}
