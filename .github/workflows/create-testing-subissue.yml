name: Create testing sub-issue (reusable)

on:
  workflow_call:
    inputs:
      owner:
        description: Organization or user that owns the repo containing the parent issue
        required: true
        type: string
      repo:
        description: Repository name that contains the parent issue
        required: true
        type: string
      issue_number:
        description: Issue number of the parent issue
        required: true
        type: number
      parent_title:
        description: Title of the parent issue
        required: true
        type: string
      has_needs_testing:
        description: True if the parent issue has the needs-testing label
        required: true
        type: boolean
      project_owner:
        description: Organization or user that owns the Project V2
        required: false
        default: iOPSPro
        type: string
      project_number:
        description: Project V2 number (e.g., 5 for iOPSPro/5)
        required: false
        default: 5
        type: number
      iteration_field_name:
        description: Primary Project Iteration field name to copy from parent
        required: false
        default: Iteration
        type: string
      secondary_iteration_field_name:
        description: Secondary Project Iteration field name to copy from parent
        required: false
        default: 60 Day Block
        type: string
    secrets:
      project_token:
        description: Token with access to read/write Project V2 fields
        required: true

jobs:
  create_testing_subissue:
    name: Create testing child issue
    runs-on: ubuntu-latest
    if: ${{ inputs.has_needs_testing }}
    permissions:
      issues: write
      contents: read

    steps:
      - name: Read parent issue metadata
        id: parent
        uses: actions/github-script@v8
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const issue_number = Number('${{ inputs.issue_number }}');

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const labels = issue.labels.map(label =>
              typeof label === 'string' ? label : label.name
            );

            const assignees = (issue.assignees || []).map(assignee => assignee.login);
            const alreadyCreated = labels.includes('testing-created');

            core.setOutput('already_created', alreadyCreated ? 'true' : 'false');
            core.setOutput('parent_labels_json', JSON.stringify(labels));
            core.setOutput('parent_assignees_json', JSON.stringify(assignees));
            core.setOutput('parent_issue_node_id', issue.node_id);

      - name: Create testing child issue
        if: ${{ steps.parent.outputs.already_created != 'true' }}
        id: create_child
        uses: actions/github-script@v8
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const parentIssueNumber = Number('${{ inputs.issue_number }}');
            const parentTitle = '${{ inputs.parent_title }}';
            const parentAssignees = JSON.parse('${{ steps.parent.outputs.parent_assignees_json }}');

            const childTitle = `Testing: ${parentTitle}`;
            const childBody = [
              `Testing child issue for #${parentIssueNumber}`,
              ``,
              `Parent issue: #${parentIssueNumber}`,
              ``,
              `## Testing Checklist`,
              `- [ ] Validate acceptance criteria`,
              `- [ ] Validate no regressions`,
              `- [ ] Capture screenshots / notes as needed`
            ].join('\n');

            const payload = {
              owner,
              repo,
              title: childTitle,
              body: childBody,
              labels: ['testing']
            };

            if (parentAssignees.length > 0) {
              payload.assignees = parentAssignees;
            }

            const created = await github.rest.issues.create(payload);

            core.setOutput('child_issue_number', String(created.data.number));
            core.setOutput('child_issue_id', String(created.data.id));
            core.setOutput('child_issue_node_id', String(created.data.node_id));

      - name: Attach testing child as sub-issue
        if: ${{ steps.parent.outputs.already_created != 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const parentIssueNumber = Number('${{ inputs.issue_number }}');
            const childIssueId = Number('${{ steps.create_child.outputs.child_issue_id }}');

            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
              owner,
              repo,
              issue_number: parentIssueNumber,
              sub_issue_id: childIssueId
            });

      - name: Copy project iteration fields from parent to child
        if: ${{ steps.parent.outputs.already_created != 'true' }}
        uses: actions/github-script@v8
        env:
          INPUT_PROJECT_OWNER: ${{ inputs.project_owner }}
          INPUT_PROJECT_NUMBER: ${{ inputs.project_number }}
          INPUT_PRIMARY_FIELD_NAME: ${{ inputs.iteration_field_name }}
          INPUT_SECONDARY_FIELD_NAME: ${{ inputs.secondary_iteration_field_name }}
          INPUT_PARENT_NODE_ID: ${{ steps.parent.outputs.parent_issue_node_id }}
          INPUT_CHILD_NODE_ID: ${{ steps.create_child.outputs.child_issue_node_id }}
        with:
          github-token: ${{ secrets.project_token }}
          script: |
            const projectOwner = process.env.INPUT_PROJECT_OWNER;
            const projectNumber = Number(process.env.INPUT_PROJECT_NUMBER);
            const primaryFieldName = (process.env.INPUT_PRIMARY_FIELD_NAME || 'Iteration').trim();
            const secondaryFieldName = (process.env.INPUT_SECONDARY_FIELD_NAME || '60 Day Block').trim();
            const parentIssueNodeId = process.env.INPUT_PARENT_NODE_ID;
            const childIssueNodeId = process.env.INPUT_CHILD_NODE_ID;

            const queryProjectForOrg = `
              query($login: String!, $number: Int!, $cursor: String) {
                organization(login: $login) {
                  projectV2(number: $number) {
                    id
                    title
                    fields(first: 100) {
                      nodes {
                        ... on ProjectV2IterationField {
                          id
                          name
                        }
                      }
                    }
                    items(first: 100, after: $cursor) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        id
                        content {
                          ... on Issue {
                            id
                          }
                        }
                        fieldValues(first: 50) {
                          nodes {
                            ... on ProjectV2ItemFieldIterationValue {
                              field {
                                ... on ProjectV2IterationField {
                                  id
                                  name
                                }
                              }
                              iterationId
                              title
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const queryProjectForUser = `
              query($login: String!, $number: Int!, $cursor: String) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    title
                    fields(first: 100) {
                      nodes {
                        ... on ProjectV2IterationField {
                          id
                          name
                        }
                      }
                    }
                    items(first: 100, after: $cursor) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        id
                        content {
                          ... on Issue {
                            id
                          }
                        }
                        fieldValues(first: 50) {
                          nodes {
                            ... on ProjectV2ItemFieldIterationValue {
                              field {
                                ... on ProjectV2IterationField {
                                  id
                                  name
                                }
                              }
                              iterationId
                              title
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const getProjectPage = async (cursor = null) => {
              try {
                const orgResult = await github.graphql(queryProjectForOrg, {
                  login: projectOwner,
                  number: projectNumber,
                  cursor
                });
                const orgProject = orgResult?.organization?.projectV2;
                if (orgProject) return orgProject;
              } catch (error) {
                // Ignore and try user lookup next.
              }

              const userResult = await github.graphql(queryProjectForUser, {
                login: projectOwner,
                number: projectNumber,
                cursor
              });
              const userProject = userResult?.user?.projectV2;
              if (userProject) return userProject;

              throw new Error(`Project not found: ${projectOwner}/${projectNumber}`);
            };

            const firstPage = await getProjectPage(null);
            const projectId = firstPage.id;
            const projectTitle = firstPage.title;

            const availableIterationFields = (firstPage.fields?.nodes || []).filter(Boolean);
            const availableFieldMap = new Map(
              availableIterationFields.map(field => [(field.name || '').trim().toLowerCase(), field])
            );

            const fieldNamesToCopy = [primaryFieldName, secondaryFieldName].filter(Boolean);
            const desiredFieldNames = fieldNamesToCopy.map(name => name.toLowerCase());

            let parentItem =
              (firstPage.items?.nodes || []).find(item => item?.content?.id === parentIssueNodeId) || null;
            let childItem =
              (firstPage.items?.nodes || []).find(item => item?.content?.id === childIssueNodeId) || null;

            let hasNextPage = firstPage.items?.pageInfo?.hasNextPage || false;
            let cursor = firstPage.items?.pageInfo?.endCursor || null;

            while ((!parentItem || !childItem) && hasNextPage) {
              const nextPage = await getProjectPage(cursor);

              if (!parentItem) {
                parentItem =
                  (nextPage.items?.nodes || []).find(item => item?.content?.id === parentIssueNodeId) || null;
              }

              if (!childItem) {
                childItem =
                  (nextPage.items?.nodes || []).find(item => item?.content?.id === childIssueNodeId) || null;
              }

              hasNextPage = nextPage.items?.pageInfo?.hasNextPage || false;
              cursor = nextPage.items?.pageInfo?.endCursor || null;
            }

            if (!childItem) {
              const addToProjectMutation = `
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                    item {
                      id
                    }
                  }
                }
              `;

              const addResult = await github.graphql(addToProjectMutation, {
                projectId,
                contentId: childIssueNodeId
              });

              const addedChildItemId = addResult?.addProjectV2ItemById?.item?.id || null;
              if (!addedChildItemId) {
                throw new Error(`Failed to add testing child issue to project "${projectTitle}".`);
              }

              childItem = {
                id: addedChildItemId,
                fieldValues: { nodes: [] }
              };
            }

            if (!parentItem) {
              core.info(`Parent issue is not present in project "${projectTitle}". Skipping project field copy.`);
              return;
            }

            const parentIterationValues = (parentItem.fieldValues?.nodes || [])
              .filter(Boolean)
              .filter(value => {
                const fieldName = value?.field?.name?.trim().toLowerCase();
                return fieldName && desiredFieldNames.includes(fieldName);
              });

            if (parentIterationValues.length === 0) {
              core.info(`No matching parent iteration field values found to copy from project "${projectTitle}".`);
              return;
            }

            const updateIterationMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $iterationId: String!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { iterationId: $iterationId }
                  }
                ) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            for (const value of parentIterationValues) {
              const parentFieldName = value?.field?.name?.trim();
              const parentFieldId = value?.field?.id;
              const parentIterationId = value?.iterationId;
              const normalizedFieldName = parentFieldName?.toLowerCase();

              if (!parentFieldName || !parentFieldId || !parentIterationId) {
                continue;
              }

              if (!availableFieldMap.has(normalizedFieldName)) {
                core.info(`Field "${parentFieldName}" is not available on project "${projectTitle}". Skipping.`);
                continue;
              }

              await github.graphql(updateIterationMutation, {
                projectId,
                itemId: childItem.id,
                fieldId: parentFieldId,
                iterationId: parentIterationId
              });

              core.info(`Copied "${parentFieldName}" = "${value.title}" from parent to testing child.`);
            }

      - name: Add testing-created label to parent
        if: ${{ steps.parent.outputs.already_created != 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const issue_number = Number('${{ inputs.issue_number }}');
            const existingLabels = JSON.parse('${{ steps.parent.outputs.parent_labels_json }}');

            const mergedLabels = [...new Set([...existingLabels, 'testing-created'])];

            await github.rest.issues.update({
              owner,
              repo,
              issue_number,
              labels: mergedLabels
            });

      - name: Comment on parent issue
        if: ${{ steps.parent.outputs.already_created != 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const issue_number = Number('${{ inputs.issue_number }}');
            const childIssueNumber = '${{ steps.create_child.outputs.child_issue_number }}';

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `Created testing child issue: #${childIssueNumber}`
            });

# Example per-repo caller workflow:
