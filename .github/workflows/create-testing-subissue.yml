Ok. Here is the .github/workflows/create-testing-subissue.yml

name: Create testing sub-issue (reusable)

on:
  workflow_call:
    inputs:
      owner:
        description: Organization or user that owns the repo containing the parent issue
        required: true
        type: string
      repo:
        description: Repository name that contains the parent issue
        required: true
        type: string
      issue_number:
        description: Issue number of the parent issue
        required: true
        type: number
      parent_title:
        description: Title of the parent issue
        required: true
        type: string
      has_needs_testing:
        description: True if the parent issue has the needs-testing label
        required: true
        type: boolean

jobs:
  create_testing_subissue:
    name: Create testing child issue
    runs-on: ubuntu-latest
    if: ${{ inputs.has_needs_testing }}
    permissions:
      issues: write
      contents: read

    steps:
      - name: Read parent issue metadata
        id: parent
        uses: actions/github-script@v8
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const issue_number = Number('${{ inputs.issue_number }}');

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const labels = issue.labels.map(label =>
              typeof label === 'string' ? label : label.name
            );

            const assignees = (issue.assignees || []).map(assignee => assignee.login);
            const alreadyCreated = labels.includes('testing-created');

            core.setOutput('already_created', alreadyCreated ? 'true' : 'false');
            core.setOutput('parent_labels_json', JSON.stringify(labels));
            core.setOutput('parent_assignees_json', JSON.stringify(assignees));

      - name: Create testing child issue
        if: ${{ steps.parent.outputs.already_created != 'true' }}
        id: create_child
        uses: actions/github-script@v8
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const parentIssueNumber = Number('${{ inputs.issue_number }}');
            const parentTitle = '${{ inputs.parent_title }}';
            const parentAssignees = JSON.parse('${{ steps.parent.outputs.parent_assignees_json }}');

            const childTitle = `Testing: ${parentTitle}`;
            const childBody = [
              `Testing child issue for #${parentIssueNumber}`,
              ``,
              `Parent issue: #${parentIssueNumber}`,
              ``,
              `## Testing Checklist`,
              `- [ ] Validate acceptance criteria`,
              `- [ ] Validate no regressions`,
              `- [ ] Capture screenshots / notes as needed`
            ].join('\n');

            const payload = {
              owner,
              repo,
              title: childTitle,
              body: childBody,
              labels: ['testing']
            };

            if (parentAssignees.length > 0) {
              payload.assignees = parentAssignees;
            }

            const created = await github.rest.issues.create(payload);

            core.setOutput('child_issue_number', String(created.data.number));
            core.setOutput('child_issue_id', String(created.data.id));

      - name: Attach testing child as sub-issue
        if: ${{ steps.parent.outputs.already_created != 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const parentIssueNumber = Number('${{ inputs.issue_number }}');
            const childIssueId = Number('${{ steps.create_child.outputs.child_issue_id }}');

            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
              owner,
              repo,
              issue_number: parentIssueNumber,
              sub_issue_id: childIssueId
            });

      - name: Add testing-created label to parent
        if: ${{ steps.parent.outputs.already_created != 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const issue_number = Number('${{ inputs.issue_number }}');
            const existingLabels = JSON.parse('${{ steps.parent.outputs.parent_labels_json }}');

            const mergedLabels = [...new Set([...existingLabels, 'testing-created'])];

            await github.rest.issues.update({
              owner,
              repo,
              issue_number,
              labels: mergedLabels
            });

      - name: Comment on parent issue
        if: ${{ steps.parent.outputs.already_created != 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const issue_number = Number('${{ inputs.issue_number }}');
            const childIssueNumber = '${{ steps.create_child.outputs.child_issue_number }}';

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `Created testing child issue: #${childIssueNumber}`
            });

