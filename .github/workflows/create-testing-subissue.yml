name: Create testing sub-issue (reusable)

on:
  workflow_call:
    inputs:
      owner:
        description: Organization or user that owns the repo containing the parent issue
        required: true
        type: string
      repo:
        description: Repository name that contains the parent issue
        required: true
        type: string
      issue_number:
        description: Issue number of the parent issue
        required: true
        type: number
      parent_title:
        description: Title of the parent issue
        required: true
        type: string
      has_needs_testing:
        description: True if the parent issue has the needs-testing label
        required: true
        type: boolean

jobs:
  create_testing_subissue:
    name: Create testing child issue
    runs-on: ubuntu-latest
    if: ${{ inputs.has_needs_testing }}
    permissions:
      issues: write
      contents: read

    steps:
      - name: Check whether testing child already exists
        id: check_existing
        uses: actions/github-script@v7
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const issue_number = Number('${{ inputs.issue_number }}');

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const labels = issue.labels.map(label =>
              typeof label === 'string' ? label : label.name
            );

            const alreadyCreated = labels.includes('testing-created');
            core.setOutput('already_created', alreadyCreated ? 'true' : 'false');

      - name: Create testing child issue
        if: ${{ steps.check_existing.outputs.already_created != 'true' }}
        id: create_child
        uses: actions/github-script@v7
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const parentIssueNumber = Number('${{ inputs.issue_number }}');
            const parentTitle = '${{ inputs.parent_title }}';

            const childTitle = `Testing: ${parentTitle}`;
            const childBody = [
              `Testing child issue for #${parentIssueNumber}`,
              ``,
              `Parent issue: #${parentIssueNumber}`,
              ``,
              `## Testing Checklist`,
              `- [ ] Validate acceptance criteria`,
              `- [ ] Validate no regressions`,
              `- [ ] Capture screenshots / notes as needed`
            ].join('\n');

            const created = await github.rest.issues.create({
              owner,
              repo,
              title: childTitle,
              body: childBody,
              labels: ['testing']
            });

            core.setOutput('child_issue_number', String(created.data.number));

      - name: Add testing-created label to parent
        if: ${{ steps.check_existing.outputs.already_created != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const issue_number = Number('${{ inputs.issue_number }}');

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const labels = issue.labels.map(label =>
              typeof label === 'string' ? label : label.name
            );

            const mergedLabels = [...new Set([...labels, 'testing-created'])];

            await github.rest.issues.update({
              owner,
              repo,
              issue_number,
              labels: mergedLabels
            });

      - name: Comment on parent issue
        if: ${{ steps.check_existing.outputs.already_created != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = '${{ inputs.owner }}';
            const repo = '${{ inputs.repo }}';
            const issue_number = Number('${{ inputs.issue_number }}');
            const childIssueNumber = '${{ steps.create_child.outputs.child_issue_number }}';

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `Created testing child issue: #${childIssueNumber}`
            });

