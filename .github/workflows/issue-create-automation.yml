name: Issue create automation

on:
  issues:
    types: [opened]

jobs:
  apply_iteration_label:
    if: ${{ github.event.issue.state == 'open' }}
    uses: iOPSPro/.github/.github/workflows/apply-issue-form-iteration-label.yml@main
    with:
      owner: ${{ github.repository_owner }}
      repo: ${{ github.event.repository.name }}
      issue_number: ${{ github.event.issue.number }}
    secrets: inherit

  sync_iteration:
    needs: apply_iteration_label
    if: ${{ github.event.issue.state == 'open' }}
    uses: iOPSPro/.github/.github/workflows/sync-project-iteration-from-label.yml@main
    with:
      owner: ${{ github.repository_owner }}
      repo: ${{ github.event.repository.name }}
      issue_number: ${{ github.event.issue.number }}
      project_owner: iOPSPro
      project_number: 5
    secrets:
      project_token: ${{ secrets.PROJECT_TOKEN }}

  spawn_testing_issue:
    needs: sync_iteration
    if: ${{ github.event.issue.state == 'open' && contains(github.event.issue.labels.*.name, 'needs-testing') }}
    uses: iOPSPro/.github/.github/workflows/create-testing-subissue.yml@main
    with:
      owner: ${{ github.repository_owner }}
      repo: ${{ github.event.repository.name }}
      issue_number: ${{ github.event.issue.number }}
      parent_title: ${{ github.event.issue.title }}
      has_needs_testing: ${{ contains(github.event.issue.labels.*.name, 'needs-testing') }}
      project_owner: iOPSPro
      project_number: 5
    secrets:
      project_token: ${{ secrets.PROJECT_TOKEN }}